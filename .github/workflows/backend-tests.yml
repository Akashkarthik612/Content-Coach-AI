name: Backend Tests

on:
  push:
    branches: [main, develop, "feat/**", "feature/**", "fix/**"]
    paths:
      - "backend/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-test.txt"
      - "pytest.ini"
      - "alembic.ini"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-test.txt"
      - "pytest.ini"

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_content_coach
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_content_coach
      REDIS_URL: redis://localhost:6379/1
      LANGCHAIN_API_KEY_GEMINI: ci-placeholder-not-real
      OPENAI_API_KEY: ci-placeholder-not-real

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Run backend tests
        run: |
          pytest tests/ \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false
